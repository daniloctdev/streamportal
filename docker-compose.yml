services:
  streamportal:
    build: .
    ports:
      - "3005:3005"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3005,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APPLICATION_SERVER_PORT=3005
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 
